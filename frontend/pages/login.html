<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fintrack — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/assets/css/login-resgistrer.css">
</head>
<body>
  <div class="auth-bg">
    <div class="grid-lines"></div>
    <div class="glow"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <span class="logo">Fin<span>track</span></span>
      <p class="tagline">controle financeiro pessoal</p>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Entrar</h1>
      <p class="auth-sub">Bem-vindo de volta.</p>

      <div id="erro-msg" class="erro-msg" style="display:none;"></div>

      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-senha" onclick="toggleSenha('senha', this)" tabindex="-1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-auth" id="btn-login" onclick="fazerLogin()">
        <span class="btn-text">Entrar</span>
        <span class="btn-loader" style="display:none">●●●</span>
      </button>

      <p class="auth-link">Não tem conta? <a href="/frontend/pages/register.html">Criar conta</a></p>
    </div>
  </div>

  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/Auth.js"></script>
</body>
</html>
